amcl:
  ros__parameters:
    use_sim_time: True   # REPLAY: True — el reloj viene del bag (--clock)

    # ── WiFi Montecarla — DESACTIVADO en replay ──────────────────────────────
    # El objetivo del replay es obtener /amcl_pose en map frame, no localización WiFi.
    # WiFi se activa sólo en los experimentos A/B con el bag replay_amcl_*.
    wifi_enabled: false
    wifi_sigma: 8.0
    wifi_alpha: 0.7
    wifi_min_aps: 1
    wifi_map_dir: "/maps"

    # ── AMCL estándar ────────────────────────────────────────────────────────
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: scan
    map_topic: map

    min_particles: 2000
    max_particles: 8000
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    transform_tolerance: 0.5
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.03
    update_min_d: 0.05
    update_min_a: 0.1
    laser_model_type: likelihood_field
    laser_max_range: 8.0
    laser_min_range: 0.15
    max_beams: 180
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    tf_broadcast: true
    set_initial_pose: true
    initial_pose:
      x: 0.0   # posición en map frame donde empieza el robot (origen del mapa SLAM)
      y: 0.0
      z: 0.0
      yaw: 0.0
    first_map_only: true
    always_reset_initial_pose: false
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
