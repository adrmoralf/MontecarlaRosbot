# compose.rosbot.yaml — stack del ROSbot 2R físico
#
# PERFILES:
#   (sin perfil)  — servicios siempre activos: rosbot + rplidar
#   map           — slam-toolbox para construir el mapa
#   survey        — wifi-scanner + bag-recorder-survey para grabar el bag de evaluación
#
# Uso survey (grabación del bag de datos reales):
#   cd ~/MontecarlaRosbot/docker-compose
#   docker compose -f compose.rosbot.yaml --profile survey up
#   [teleop por toda la casa durante ≥4 min]
#   docker stop docker-compose-bag-recorder-survey-1
#   sleep 10
#   docker compose -f compose.rosbot.yaml --profile survey down

services:

  rosbot:
    image: husarion/rosbot:humble-0.13.1-20240201
    network_mode: host
    ipc: host
    restart: unless-stopped
    devices:
      - /dev/ttyAMA0
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: >
      ros2 launch rosbot_bringup combined.launch.py
        mecanum:=False
        serial_port:=/dev/ttyAMA0
        serial_baudrate:=576000

  rplidar:
    image: husarion/rplidar:humble
    network_mode: host
    ipc: host
    restart: unless-stopped
    devices:
      - /dev/ttyUSB0
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: >
      ros2 launch sllidar_ros2 sllidar_launch.py
        serial_port:=/dev/ttyUSB0
        serial_baudrate:=256000

  slam-toolbox:
    profiles: ["map"]
    image: husarion/slam-toolbox:humble
    network_mode: host
    ipc: host
    restart: unless-stopped
    depends_on:
      rosbot:
        condition: service_started
    volumes:
      - ./config/slam_params.yaml:/slam_params.yaml
      - ./maps:/maps
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: bash -c "sleep 30 && ros2 launch slam_toolbox online_sync_launch.py slam_params_file:=/slam_params.yaml"

  # ── PERFIL: survey ──────────────────────────────────────────────────────────
  # Graba el bag de evaluación para el experimento real.
  # El mismo bag sirve para: (a) construir el radiomap, (b) replay A/B en el PC.
  #
  # Prerrequisitos:
  #   1. Mapa SLAM ya guardado en docker-compose/maps/casa_real.{pgm,yaml}
  #   2. docker build -f montecarla_real/Dockerfile -t wifi-scanner:real . (en el ROSbot)
  #
  # Requisito Docker: NET_ADMIN para iw scan dump (si falla, fallback a nmcli via D-Bus)

  wifi-scanner:
    profiles: ["survey"]
    image: wifi-scanner:real           # construida en el ROSbot con ARM64
    network_mode: host
    ipc: host
    cap_add:
      - NET_ADMIN                      # necesario para iw dev wlan0 scan dump
    volumes:
      - /var/run/dbus:/var/run/dbus:ro # fallback: nmcli via D-Bus si iw falla
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: >
      ros2 run wifi_scanner wifi_scanner_node
        --ros-args
        -p interfaz:=wlan0
        -p frecuencia_hz:=0.5
        -p bssids_permitidos:=[]

  bag-recorder-survey:
    profiles: ["survey"]
    image: wifi-scanner:real
    network_mode: host
    ipc: host
    depends_on:
      wifi-scanner:
        condition: service_started
    volumes:
      - ~/real_bags:/bags
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      mkdir -p /bags &&
      ros2 bag record
        /scan /tf /tf_static /odometry/filtered /wifi_scan
        -o /bags/survey_$(date +%Y%m%d_%H%M%S)"

  nav2:
    image: nav2-wifi-heatmap
    build: ../nav2-wifi-heatmap
    network_mode: host
    ipc: host
    restart: unless-stopped
    volumes:
      - ~/net_expose:/net_expose
      - ../nav2-wifi-heatmap/config/nav2_params.yaml:/ros2_ws/config/nav2_params.yaml
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DDS_CONFIG=DEFAULT
    command: >
      ros2 launch nav2_bringup navigation_launch.py
        params_file:=/ros2_ws/config/nav2_params.yaml
