# compose.real_replay.yaml — Opción B: replay del survey bag con AMCL para alinear radiomap
# ─────────────────────────────────────────────────────────────────────────────
# Problema: el survey bag tiene poses en frame "odom" (odometría sin SLAM).
# Solución: reproducir el bag a través de AMCL (que tiene el mapa SLAM real)
# y grabar /amcl_pose (map frame) + /wifi_scan → nuevo bag replay_amcl_*.
# Ese bag se usa después para construir el radiomap alineado con casa_real.pgm.
#
# Requisito previo (una sola vez):
#   cd ~/MontecarlaRosbot
#   docker compose -f docker-compose/compose.real_replay.yaml build
#
# Uso:
#   cd ~/MontecarlaRosbot/docker-compose
#   BAG_NAME=survey_20260628_112952 docker compose -f compose.real_replay.yaml up
#   [Esperar a que el bag-player termine (~11 min a rate 0.5)]
#   docker compose -f compose.real_replay.yaml down
#
# Construir radiomap tras el replay:
#   python3 ../montecarla_sim/radiomap_builder/construir_radiomap.py \
#     --bag ~/real_bags/replay_amcl_XXXXXXXX_XXXXXX \
#     --pose-topic /amcl_pose \
#     --mapa maps/casa_real.yaml \
#     --salida maps/ \
#     --bssids AP_SURVEY_01 AP_SURVEY_02 AP_SURVEY_03
# ─────────────────────────────────────────────────────────────────────────────

x-ros-env: &ros_env
  ROS_DOMAIN_ID: "0"
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  DDS_CONFIG: DEFAULT

services:

  # Publica /map (TRANSIENT_LOCAL) con el mapa SLAM real.
  # nav2_map_server es lifecycle node: hay que configure+activate antes de que
  # el bag-player empiece a publicar /clock (use_sim_time requiere reloj activo).
  map-server:
    build:
      context: ..
      dockerfile: montecarla_amcl/Dockerfile
    network_mode: host
    ipc: host
    volumes:
      - ./maps:/maps:ro
    environment:
      <<: *ros_env
    command: bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      ros2 run nav2_map_server map_server
        --ros-args -p yaml_filename:=/maps/casa_real.yaml -p use_sim_time:=true &
      sleep 5 &&
      ros2 lifecycle set /map_server configure &&
      ros2 lifecycle set /map_server activate &&
      wait"

  # AMCL con mapa real y use_sim_time=true. Suscribe /scan (del bag) y publica
  # /amcl_pose (robot pose en map frame) + /tf (map→odom).
  montecarla-amcl:
    build:
      context: ..
      dockerfile: montecarla_amcl/Dockerfile
    network_mode: host
    ipc: host
    depends_on:
      map-server:
        condition: service_started
    volumes:
      - ./maps:/maps:ro
      - ../montecarla_amcl/config/montecarla_amcl_real_replay.yaml:/params.yaml:ro
    environment:
      <<: *ros_env
      WIFI_ENABLED: "false"
    command: bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      ros2 launch montecarla_amcl localization_launch.py
        params_file:=/params.yaml
        map:=/maps/casa_real.yaml
        use_sim_time:=true
        autostart:=true
        wifi_enabled:=false"

  # Reproduce el survey bag con --clock (publica /clock para use_sim_time).
  # rate 0.5: mitad de velocidad para dar margen a AMCL de procesar cada scan.
  # sleep 15: espera a que map-server + AMCL estén listos antes de publicar.
  bag-player:
    build:
      context: ..
      dockerfile: montecarla_amcl/Dockerfile
    network_mode: host
    ipc: host
    depends_on:
      montecarla-amcl:
        condition: service_started
    volumes:
      - ~/real_bags:/bags:ro
    environment:
      <<: *ros_env
    command: bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      sleep 15 &&
      ros2 bag play /bags/${BAG_NAME:-survey_20260628_112952} --clock --rate 0.5"

  # Graba /amcl_pose (map frame, de AMCL) + /wifi_scan (del bag-player).
  # El bag resultante tiene las medidas WiFi ubicadas en el frame del mapa SLAM.
  bag-recorder-amcl:
    build:
      context: ..
      dockerfile: montecarla_amcl/Dockerfile
    network_mode: host
    ipc: host
    depends_on:
      montecarla-amcl:
        condition: service_started
    volumes:
      - ~/real_bags:/bags
    environment:
      <<: *ros_env
    command: bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      mkdir -p /bags &&
      ros2 bag record /amcl_pose /wifi_scan
        -o /bags/replay_amcl_$(date +%Y%m%d_%H%M%S)"
